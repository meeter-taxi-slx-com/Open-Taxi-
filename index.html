
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS4 TAXI - Live Meter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #001f3f; --secondary: #27ae60; --accent: #c0392b; --gray: #95a5a6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .logo-header { background: #000; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .header-title { color: white; font-size: 24px; font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; }
        .btn-start { background: var(--secondary); }
        .btn-end { background: var(--accent); }
        
        /* LIVE AREA */
        #live-stats { display: none; margin: 15px 0; text-align: center; background: #fff3f3; padding: 15px; border-radius: 15px; border: 1px solid #ffc1c1; }
        #live-timer { font-size: 22px; font-weight: bold; color: var(--accent); }
        #live-distance { font-size: 24px; font-weight: bold; color: var(--primary); margin-top: 10px; }
        
        #receipt-area { display: none; margin-top: 20px; padding: 20px; border: 2px solid var(--primary); border-radius: 15px; background: #fff; }
        .r-total { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 10px; font-size: 22px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-header">
        <span class="header-title">AS4 TAXI</span>
    </div>
    <input type="tel" id="cust-mobile" placeholder="Customer Mobile">
    <input id="start-loc" placeholder="Start Town">
    <input id="end-loc" placeholder="End Town">
    
    <div id="live-stats">
        <div id="live-timer">Time: 00:00:00</div>
        <div id="live-distance">Distance: 0.00 km</div>
    </div>

    <button class="btn-start" id="startBtn" onclick="startRide()">START RIDE</button>
    <button class="btn-end" onclick="endRide()">END RIDE</button>
    <button style="background:var(--gray)" onclick="location.reload()">NEW RIDE</button>

    <div id="receipt-area">
        <div id="r-route" style="font-weight:bold; text-align:center; margin-bottom:10px;"></div>
        <div style="display:flex; justify-content:space-between;"><span>Distance:</span><span id="r-dist"></span></div>
        <div class="r-total" id="r-total"></div>
        <button style="background:#25d366; margin-top:15px;" onclick="shareReceipt()">SHARE TO WHATSAPP</button>
    </div>
</div>

<script>
    let sTime, sLat, sLon, timerInterval, watchID, totalDist = 0;

    function startRide() {
        if (navigator.geolocation) {
            sTime = new Date();
            document.getElementById('startBtn').innerText = "RIDE ACTIVE ✅";
            document.getElementById('live-stats').style.display = "block";
            timerInterval = setInterval(updateTimer, 1000);

            navigator.geolocation.getCurrentPosition(p => {
                sLat = p.coords.latitude; sLon = p.coords.longitude;
            });

            // මේක තමයි ලයිව් දුර මනින කොටස
            watchID = navigator.geolocation.watchPosition(p => {
                totalDist = calculateDistance(sLat, sLon, p.coords.latitude, p.coords.longitude);
                document.getElementById('live-distance').innerText = `Distance: ${totalDist.toFixed(2)} km`;
            }, null, { enableHighAccuracy: true });
        }
    }

    function updateTimer() {
        let diff = Math.floor((new Date() - sTime) / 1000);
        let hrs = Math.floor(diff / 3600).toString().padStart(2, '0');
        let mins = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        let secs = (diff % 60).toString().padStart(2, '0');
        document.getElementById('live-timer').innerText = `Time: ${hrs}:${mins}:${secs}`;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function endRide() {
        clearInterval(timerInterval);
        navigator.geolocation.clearWatch(watchID);
        let fare = Math.round(100 + (Math.max(0, totalDist - 1) * 80));
        document.getElementById('r-dist').innerText = totalDist.toFixed(2) + " km";
        document.getElementById('r-total').innerText = "Rs. " + fare;
        document.getElementById('r-route').innerText = document.getElementById('start-loc').value + " to " + document.getElementById('end-loc').value;
        document.getElementById('receipt-area').style.display = "block";
        document.getElementById('live-stats').style.display = "none";
    }

    async function shareReceipt() {
        const canvas = await html2canvas(document.getElementById('receipt-area'));
        canvas.toBlob(blob => {
            const file = new File([blob], 'Receipt.png', { type: 'image/png' });
            if (navigator.share) navigator.share({ files: [file] });
        });
    }
</script>
</body>
</html>
