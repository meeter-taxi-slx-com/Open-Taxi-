<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS4 TAXI - Professional Hire Meter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a4a9e; --secondary: #2ecc71; --accent: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #eee; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        .header-box { text-align: center; margin-bottom: 20px; }
        .logo-circle { background: #1a4a9e; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; border: 4px solid #fff; font-size: 20px; }
        .brand-name { color: #1a4a9e; font-size: 22px; font-weight: 900; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-start { background: #2ecc71; } .btn-end { background: #e74c3c; } .btn-new { background: #95a5a6; } .btn-report { background: #34495e; }
        #live-meter { display: none; text-align: center; margin: 15px 0; padding: 15px; background: #fdf2f2; border-radius: 15px; border: 1px solid #fadbd8; }
        .revenue-section { margin: 20px 0; border: 1px solid #ddd; border-radius: 20px; padding: 15px; }
        .rev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .rev-card { background: #f8f9fa; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; font-size: 12px; }
        #receipt-area { display: none; margin-top: 20px; border: 2px solid #1a4a9e; border-radius: 15px; padding: 15px; background: white; }
        #history-area { display: none; margin-top: 15px; padding: 10px; border-top: 1px solid #ddd; max-height: 200px; overflow-y: auto; font-size: 12px; }
        .r-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 8px 0; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-box"><div class="logo-circle">AS4</div><div class="brand-name">AS4 TAXI</div></div>
    
    <input type="tel" id="mobile" placeholder="Customer Mobile (Optional)">
    <input list="wp-towns" id="start-loc" placeholder="From (Start Location)">
    <input list="wp-towns" id="end-loc" placeholder="To (End Location)">

    <datalist id="wp-towns">
        <option value="Colombo Fort"><option value="Pettah"><option value="Kollupitiya"><option value="Bambalapitiya">
        <option value="Havelock Town"><option value="Wellawatte"><option value="Cinnamon Gardens"><option value="Borella">
        <option value="Dematagoda"><option value="Maradana"><option value="Kotahena"><option value="Grandpass">
        <option value="Nugegoda"><option value="Maharagama"><option value="Kottawa"><option value="Pannipitiya">
        <option value="Homagama"><option value="Kaduwela"><option value="Malabe"><option value="Battaramulla">
        <option value="Rajagiriya"><option value="Dehiwala"><option value="Mount Lavinia"><option value="Ratmalana">
        <option value="Moratuwa"><option value="Piliyandala"><option value="Boralesgamuwa"><option value="Athurugiriya">
        <option value="Talawatugoda"><option value="Padukka"><option value="Hanwella"><option value="Avissawella">
        <option value="Gampaha"><option value="Negombo"><option value="Katunayake"><option value="Ja-Ela">
        <option value="Kandana"><option value="Wattala"><option value="Kiribathgoda"><option value="Kadawatha">
        <option value="Ragama"><option value="Kelaniya"><option value="Biyagama"><option value="Ganemulla">
        <option value="Veyangoda"><option value="Nittambuwa"><option value="Warakapola"><option value="Minuwangoda">
        <option value="Divulapitiya"><option value="Mirigama"><option value="Kirindiwela">
        <option value="Kalutara"><option value="Panadura"><option value="Horana"><option value="Beruwala">
        <option value="Aluthgama"><option value="Matugama"><option value="Wadduwa"><option value="Bandaragama">
        <option value="Ingiriya"><option value="Bulathsinhala"><option value="Agalawatte"><option value="Dharga Town">
    </datalist>

    <div id="live-meter">
        <div id="timer" style="color:#e74c3c; font-weight:bold; font-size:18px;">00:00:00</div>
        <div id="distance" style="font-size:26px; font-weight:900; color:#1a4a9e;">0.00 km</div>
    </div>

    <button class="btn-start" id="startBtn" onclick="startRide()">START RIDE</button>
    <button class="btn-end" onclick="endRide()">END RIDE</button>
    <button class="btn-new" onclick="location.reload()">NEW RIDE</button>
    <button class="btn-report" onclick="toggleHistory()">INCOME REPORTS</button>

    <div id="history-area"></div>

    <div class="revenue-section">
        <div class="rev-grid">
            <div class="rev-card">Today<br><b id="today-inc">Rs. 0</b></div>
            <div class="rev-card">This Month<br><b id="month-inc">Rs. 0</b></div>
            <div class="rev-card">Short Runs<br><b id="short-runs">0</b></div>
            <div class="rev-card">Long Runs<br><b id="long-runs">0</b></div>
        </div>
    </div>

    <div id="receipt-area">
        <div style="text-align:center; font-weight:bold; color:#1a4a9e; font-size:18px; margin-bottom:15px;">AS4 TAXI - RECEIPT</div>
        <div id="r-content"></div>
        <div style="background:#1a4a9e; color:white; padding:15px; text-align:center; border-radius:10px; margin-top:15px; font-weight:bold; font-size:20px;" id="r-total"></div>
        <button style="background:#25d366; margin-top:15px;" onclick="share()">SHARE TO WHATSAPP</button>
    </div>
</div>

<script>
    let sTime, lastLat, lastLon, watchID, totalKm = 0, timerInt;

    function startRide() {
        if (navigator.geolocation) {
            sTime = new Date();
            document.getElementById('startBtn').innerText = "RIDE ACTIVE ✅";
            document.getElementById('live-meter').style.display = "block";
            timerInt = setInterval(() => {
                let diff = Math.floor((new Date() - sTime) / 1000);
                document.getElementById('timer').innerText = new Date(diff * 1000).toISOString().substr(11, 8);
            }, 1000);
            navigator.geolocation.getCurrentPosition(p => {
                lastLat = p.coords.latitude; lastLon = p.coords.longitude;
                watchID = navigator.geolocation.watchPosition(pos => {
                    let d = calc(lastLat, lastLon, pos.coords.latitude, pos.coords.longitude);
                    if (d > 0.005) { totalKm += d; lastLat = pos.coords.latitude; lastLon = pos.coords.longitude; }
                    document.getElementById('distance').innerText = totalKm.toFixed(2) + " km";
                }, null, { enableHighAccuracy: true });
            });
        }
    }

    function calc(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function endRide() {
        if(!sTime) return;
        clearInterval(timerInt);
        navigator.geolocation.clearWatch(watchID);
        let eTime = new Date();
        let fare = Math.round(100 + (Math.max(0, totalKm - 1) * 80));
        let from = document.getElementById('start-loc').value || "Not Set";
        let to = document.getElementById('end-loc').value || "Not Set";
        
        let html = `
            <div class="r-row"><span>Date:</span> <b>${eTime.toLocaleDateString()}</b></div>
            <div class="r-row"><span>Route:</span> <b>${from} ➔ ${to}</b></div>
            <div class="r-row"><span>Distance:</span> <b>${totalKm.toFixed(2)} km</b></div>
            <div class="r-row"><span>Time:</span> <b>${sTime.toLocaleTimeString()} - ${eTime.toLocaleTimeString()}</b></div>
            <div class="r-row"><span>Mobile:</span> <b>${document.getElementById('mobile').value || 'N/A'}</b></div>
        `;
        
        document.getElementById('r-content').innerHTML = html;
        document.getElementById('r-total').innerText = "TOTAL: Rs. " + fare;
        document.getElementById('receipt-area').style.display = "block";
        document.getElementById('live-meter').style.display = "none";
        
        saveData(fare, totalKm, from, to);
    }

    function saveData(f, d, from, to) {
        let h = JSON.parse(localStorage.getItem('as4_final_master') || '[]');
        h.push({f, d, from, to, time: new Date().getTime()});
        localStorage.setItem('as4_final_master', JSON.stringify(h));
        render();
    }

    function toggleHistory() {
        let area = document.getElementById('history-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
        let h = JSON.parse(localStorage.getItem('as4_final_master') || '[]');
        area.innerHTML = h.slice().reverse().map(i => `
            <div style="border-bottom:1px solid #eee; padding:8px;">
                <b>${i.from} to ${i.to}</b><br>
                Rs.${i.f} | ${i.d.toFixed(2)}km | ${new Date(i.time).toLocaleDateString()}
            </div>
        `).join('');
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('as4_final_master') || '[]');
        let todayStr = new Date().toDateString();
        let todayData = h.filter(i => new Date(i.time).toDateString() === todayStr);
        
        document.getElementById('today-inc').innerText = "Rs. " + todayData.reduce((s, i) => s + i.f, 0);
        document.getElementById('month-inc').innerText = "Rs. " + h.reduce((s, i) => s + i.f, 0);
        document.getElementById('short-runs').innerText = h.filter(i => i.d < 5).length;
        document.getElementById('long-runs').innerText = h.filter(i => i.d >= 5).length;
    }
    render();

    async function share() {
        const canvas = await html2canvas(document.getElementById('receipt-area'));
        canvas.toBlob(b => {
            const f = new File([b], 'as4_receipt.png', {type:'image/png'});
            if(navigator.share) navigator.share({files:[f]});
        });
    }
</script>
</body>
</html>
